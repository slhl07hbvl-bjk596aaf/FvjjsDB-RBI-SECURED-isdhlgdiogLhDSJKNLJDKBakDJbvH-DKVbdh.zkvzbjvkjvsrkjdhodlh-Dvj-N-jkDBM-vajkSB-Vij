<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Interface</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f8f9fa; display: flex; justify-content: center; padding: 15px; margin: 0; }
        
        /* Main Payment Card */
        .payment-card { background: white; width: 100%; max-width: 400px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid #eee; }
        .header { background: #2196F3; color: white; text-align: center; padding: 18px; font-weight: bold; font-size: 1.25em; }
        .content { padding: 20px; }
        
        /* Detail Rows */
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border: 1px solid #f0f0f0; padding: 12px; border-radius: 8px; }
        .label { color: #888; font-size: 0.85em; }
        .value { font-weight: bold; color: #333; }
        .copy-btn { color: #2196F3; border: 1.5px solid #2196F3; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 0.75em; font-weight: bold; }
        
        /* App Grid */
        .upi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
        .upi-item { border: 1px solid #e0e0e0; border-radius: 10px; padding: 15px 12px; display: flex; align-items: center; justify-content: flex-start; background: #fff; cursor: pointer; text-decoration: none; }
        .upi-item img { height: 26px; width: auto; margin-right: 12px; }
        .upi-item span { font-size: 1.05em; font-weight: 600; color: #444; }

        /* Form Elements */
        .input-field { width: 100%; padding: 15px; margin-bottom: 15px; border: 1.5px solid #ddd; border-radius: 10px; box-sizing: border-box; outline: none; }
        .submit-btn { width: 100%; background: #2196F3; color: white; border: none; padding: 16px; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 1.1em; }
        .notice { color: #d32f2f; font-size: 0.8em; margin-top: 20px; line-height: 1.5; }

        /* 1. DARK SUBMITTED POPUP (The small square) */
        #status-popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            z-index: 2000;
            width: 140px;
        }

        /* 2. FINAL SUCCESS PAGE (Matching your request) */
        #success-page {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 3000;
            text-align: center;
        }
        .success-header { background: #2196F3; color: white; padding: 18px; font-weight: bold; font-size: 1.25em; margin-bottom: 60px; }
        .success-icon { color: #4CAF50; font-size: 80px; margin-bottom: 30px; }
        .success-text { color: #333; font-size: 1.4em; font-weight: 400; padding: 0 20px; line-height: 1.4; }
    </style>
</head>
<body onload="setupInterface()">

<!-- Popup 1: Dark Submitted Box -->
<div id="status-popup">
    <div style="font-size: 40px; margin-bottom: 10px;">✓</div>
    <div style="font-size: 14px;">Submitted</div>
</div>

<!-- Popup 2: Full Success Page (Blue Header + Success Text) -->
<div id="success-page">
    <div class="success-header">Payment</div>
    <div class="success-icon">✔</div>
    <div class="success-text">UTR submitted.<br>Verification in progress.</div>
</div>

<div class="payment-card" id="main-card">
    <div class="header">Payment</div>
    <div class="content">
        <div class="row">
            <div><div class="label">Amount</div><div class="value">₹ <span id="display_amount">3500</span></div></div>
            <div class="copy-btn" onclick="copyToClipboard('display_amount')">Copy</div>
        </div>
        <div class="row">
            <div><div class="label">VPA/UPI ID</div><div class="value" id="display_upi">asmaakter456003-2@okaxis</div></div>
            <div class="copy-btn" onclick="copyToClipboard('display_upi')">Copy</div>
        </div>

        <div class="upi-grid">
            <div class="upi-item" onclick="openApp('phonepe')"><img src="https://img.icons8.com"><span>PhonePe</span></div>
            <div class="upi-item" onclick="openApp('paytm')"><img src="https://img.icons8.com"><span>Paytm</span></div>
            <div class="upi-item" onclick="openApp('gpay')"><img src="https://img.icons8.com"><span>G Pay</span></div>
            <div class="upi-item" onclick="openApp('bhim')"><img src="https://upload.wikimedia.org"><span>BHIM</span></div>
        </div>

        <p style="font-size:0.85em; color:#666; margin-bottom: 10px;">↓ Fill the UTR numbers after payment</p>
        <input type="text" id="utr_input" class="input-field" placeholder="Input UTR number">
        <button class="submit-btn" onclick="handleSubmit()">Submit UTR</button>

        <div class="notice">
            <b>Notice:</b><br>
            1. One UPI can only transfer money once.<br>
            2. Don't change the payment amount.
        </div>
    </div>
</div>

<script>
    const CONFIG = {
        upi_id: "asmaakter456003-2@okaxis",
        amount: "3500"
    };

    function setupInterface() {
        document.getElementById('display_amount').innerText = CONFIG.amount;
        document.getElementById('display_upi').innerText = CONFIG.upi_id;
    }

    function openApp(appName) {
        let pkg = (appName==='phonepe') ? "com.phonepe.app" : (appName==='paytm') ? "net.one97.paytm" : (appName==='gpay') ? "com.google.android.apps.nbu.paisa.user" : "in.org.npci.upiapp";
        window.location.href = `intent://pay?pa=${CONFIG.upi_id}&cu=INR#Intent;scheme=upi;package=${pkg};end`;
    }

    function copyToClipboard(id) {
        const text = document.getElementById(id).innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert("Copied!");
        });
    }

    function handleSubmit() {
        const utr = document.getElementById('utr_input').value.trim();
        if (utr.length < 10) {
            alert("Please enter a valid UTR number.");
            return;
        }

        // 1. Show the dark black popup box first
        const popup = document.getElementById('status-popup');
        popup.style.display = 'block';

        // 2. Transition to full screen success page after 2 seconds
        setTimeout(() => {
            popup.style.display = 'none';
            document.getElementById('main-card').style.display = 'none';
            document.getElementById('success-page').style.display = 'block';
        }, 2000);
    }
</script>

</body>
</html>
